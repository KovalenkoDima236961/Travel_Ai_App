name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  compose:
    name: Compose and environment validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare safe CI environment
        run: cp infra/.env.ci.example infra/.env
      - name: Validate environment
        run: ./scripts/validate-env.sh --env-file infra/.env
      - name: Validate Compose profiles
        run: |
          docker compose -f infra/docker-compose.yml --env-file infra/.env --profile core config --quiet
          docker compose -f infra/docker-compose.yml --env-file infra/.env --profile core --profile ai --profile rag --profile observability --profile dev-tools config --quiet

  go:
    name: Go tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/auth-service
          - services/user-service
          - services/trip-service
          - services/notification-service
          - services/external-integrations-service
          - services/worker-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - run: go test ./...

  python:
    name: AI Planning tests and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-planning-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai-planning-service/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m ruff check app tests
      - run: python -m pytest

  web:
    name: Web typecheck, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker-build:
    name: Key image builds
    needs: compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp infra/.env.ci.example infra/.env
      - run: docker compose -f infra/docker-compose.yml --env-file infra/.env --profile core build auth-service trip-service web-app

  security-go:
    name: Go security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install Go security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan Go source
        run: ./scripts/security/gosec.sh
      - name: Check reachable Go vulnerabilities
        run: ./scripts/security/govulncheck.sh

  security-python:
    name: Python security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-planning-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai-planning-service/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt bandit pip-audit
      - name: Scan Python source
        run: ../../scripts/security/bandit.sh
      - name: Audit Python dependencies
        run: ../../scripts/security/pip-audit.sh

  security-frontend:
    name: Frontend dependency security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: ../../scripts/security/npm-audit.sh

  security-static:
    name: Secret, container, and static security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan committed history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Semgrep
        run: python -m pip install semgrep
      - name: Scan source patterns
        run: ./scripts/security/semgrep.sh
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.60.0
      - name: Scan filesystem and Compose configuration
        run: ./scripts/security/trivy.sh
