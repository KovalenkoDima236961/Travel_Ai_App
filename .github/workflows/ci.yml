name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  compose:
    name: Compose and environment validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare safe CI environment
        run: cp infra/.env.ci.example infra/.env
      - name: Validate environment
        run: ./scripts/validate-env.sh --env-file infra/.env
      - name: Validate Compose profiles
        run: |
          docker compose -f infra/docker-compose.yml --env-file infra/.env --profile core config --quiet
          docker compose -f infra/docker-compose.yml --env-file infra/.env --profile core --profile ai --profile rag --profile observability --profile dev-tools config --quiet

  go:
    name: Go tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/auth-service
          - services/user-service
          - services/trip-service
          - services/notification-service
          - services/external-integrations-service
          - services/worker-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - run: go test ./...

  python:
    name: AI Planning tests and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-planning-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai-planning-service/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m ruff check app tests
      - run: python -m pytest

  web:
    name: Web typecheck, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker-build:
    name: Key image builds
    needs: compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp infra/.env.ci.example infra/.env
      - run: docker compose -f infra/docker-compose.yml --env-file infra/.env --profile core build auth-service trip-service web-app
