name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare safe CI environment
        run: cp infra/.env.ci.example infra/.env
      - name: Validate environment
        run: ./scripts/validate-env.sh --env-file infra/.env
      - name: Validate Compose profiles
        run: |
          docker compose -f infra/docker-compose.yml --env-file infra/.env --profile core config --quiet
          docker compose -f infra/docker-compose.yml --env-file infra/.env --profile core --profile ai --profile rag --profile observability --profile dev-tools config --quiet
          docker compose -p travel-ai-test -f infra/docker-compose.yml --env-file infra/.env.test.example --profile test config --quiet
      - name: Validate deterministic test environment
        run: ./scripts/validate-env.sh test --env-file infra/.env.test.example

  go:
    name: Go tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/auth-service
          - services/user-service
          - services/trip-service
          - services/notification-service
          - services/external-integrations-service
          - services/worker-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - run: go test ./...

  python:
    name: AI Planning tests and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-planning-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai-planning-service/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m ruff check app tests
      - run: python -m pytest

  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage
          if-no-files-found: ignore

  docker-build:
    name: Docker builds
    needs: compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp infra/.env.ci.example infra/.env
      - name: Build all application images
        run: >-
          docker compose -f infra/docker-compose.yml --env-file infra/.env
          --profile core --profile test build
          auth-service user-service trip-service notification-service worker-service
          external-integrations-service ai-planning-service-test web-app migration-runner

  backend-integration:
    name: Backend integration
    needs: compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/external-integrations-service/go.mod
          cache-dependency-path: services/external-integrations-service/go.sum
      - name: Run fresh migrations and Postgres integration tests
        env:
          KEEP_TEST_STACK: "true"
        run: ./scripts/test-backend-integration.sh
      - name: Collect test stack logs on failure
        if: failure()
        run: docker compose -p travel-ai-test -f infra/docker-compose.yml --env-file infra/.env.test.example --profile test logs --no-color --tail=300
      - name: Stop integration stack
        if: always()
        run: ./scripts/test-stack-down.sh

  migrations:
    name: Fresh migrations
    needs: compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start isolated Postgres
        run: docker compose -p travel-ai-test-migrations -f infra/docker-compose.yml --env-file infra/.env.test.example --profile test up -d --wait postgres
      - name: Apply every service migration
        run: docker compose -p travel-ai-test-migrations -f infra/docker-compose.yml --env-file infra/.env.test.example --profile test run --rm migration-runner
      - name: Stop migration stack
        if: always()
        run: docker compose -p travel-ai-test-migrations -f infra/docker-compose.yml --env-file infra/.env.test.example --profile test down --volumes --remove-orphans

  playwright-e2e:
    name: Playwright E2E
    needs: [compose, web, go, python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Start deterministic full stack
        run: ./scripts/test-stack-up.sh
      - name: Run Chromium critical flows
        run: TEST_STACK_MANAGED=false ./scripts/test-frontend-e2e.sh
      - name: Collect stack logs on failure
        if: failure()
        run: docker compose -p travel-ai-test -f infra/docker-compose.yml --env-file infra/.env.test.example --profile test logs --no-color --tail=300
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 14
      - name: Stop E2E stack
        if: always()
        run: ./scripts/test-stack-down.sh

  smoke:
    name: Full-stack smoke
    needs: [compose, backend-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start deterministic full stack
        run: TEST_COMPOSE_PROJECT_NAME=travel-ai-test-smoke ./scripts/test-stack-up.sh
      - name: Exercise health, auth, trip, notification, and provider endpoints
        env:
          TEST_COMPOSE_PROJECT_NAME: travel-ai-test-smoke
          SMOKE_ENV_FILE: infra/.env.test.example
          SMOKE_ENV_TARGET: test
          TRIP_SERVICE_URL: http://127.0.0.1:18080
          AUTH_SERVICE_URL: http://127.0.0.1:18082
          SMOKE_USER_SERVICE_URL: http://127.0.0.1:18083
          SMOKE_EXTERNAL_INTEGRATIONS_SERVICE_URL: http://127.0.0.1:18084
          SMOKE_NOTIFICATION_SERVICE_URL: http://127.0.0.1:18086
          SMOKE_WORKER_SERVICE_URL: http://127.0.0.1:18090
          WEB_APP_URL: http://127.0.0.1:13000
          SMOKE_INTERNAL_SERVICE_TOKEN: test-internal-token-not-for-production
        run: ./scripts/smoke-test.sh --core
      - name: Collect stack logs on failure
        if: failure()
        run: docker compose -p travel-ai-test-smoke -f infra/docker-compose.yml --env-file infra/.env.test.example --profile test logs --no-color --tail=300
      - name: Stop smoke stack
        if: always()
        env:
          TEST_COMPOSE_PROJECT_NAME: travel-ai-test-smoke
        run: ./scripts/test-stack-down.sh

  security-go:
    name: Go security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install Go security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan Go source
        run: ./scripts/security/gosec.sh
      - name: Check reachable Go vulnerabilities
        run: ./scripts/security/govulncheck.sh

  security-python:
    name: Python security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-planning-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai-planning-service/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt bandit pip-audit
      - name: Scan Python source
        run: ../../scripts/security/bandit.sh
      - name: Audit Python dependencies
        run: ../../scripts/security/pip-audit.sh

  security-frontend:
    name: Frontend dependency security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: ../../scripts/security/npm-audit.sh

  security-static:
    name: Secret, container, and static security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan committed history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Semgrep
        run: python -m pip install semgrep
      - name: Scan source patterns
        run: ./scripts/security/semgrep.sh
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.60.0
      - name: Scan filesystem and Compose configuration
        run: ./scripts/security/trivy.sh
