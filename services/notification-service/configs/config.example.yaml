env: development

http_server:
  address: ":8086"
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 15s

postgres:
  database: notification_service
  username: postgres
  password: postgres
  host: localhost
  port: 5432
  min-conns: 2
  max-conns: 10
  mig-path: ./migrations

jwt:
  # Must match Auth Service's JWT_ACCESS_SECRET so access tokens validate.
  access_secret: "change-me-in-development"
  # Optional; reserved for stricter validation. Leave empty in v1.
  issuer: ""
  audience: ""
  header_name: "Authorization"

internal:
  # Shared service-to-service token. Trip Service presents it in the
  # X-Internal-Service-Token header on /internal/* endpoints. The same token is
  # presented by this service when calling Auth Service's /internal/users/batch.
  service_token: "dev-internal-service-token"

# Optional email delivery for selected notification types. The mock provider
# never sends external mail and is the safe local-dev default.
email:
  enabled: true
  fail_open: true
  provider: "mock" # mock | smtp
  # Comma-separated allowlist of notification types that may trigger an email.
  types: "collaboration_invited,comment_created,collaborator_role_changed,collaborator_removed"
  # Used to build safe links back to the Web App.
  public_web_base_url: "http://localhost:3000"
  smtp:
    host: ""
    port: 587
    username: ""
    # SMTP_PASSWORD comes only from the environment; never commit a real one.
    password: ""
    from_email: "no-reply@localhost"
    from_name: "AI Travel Planner"
    use_tls: true

# Service that owns recipient identity. In v1 Auth Service owns email; the
# user-lookup client calls AUTH_SERVICE_URL and presents the internal token.
users:
  auth_service_url: "http://auth-service:8082"
  user_service_url: "http://user-service:8083"
  timeout_seconds: 5

cors:
  allowed_origins: "http://localhost:3000"
  allowed_methods: "GET,PATCH,OPTIONS"
  allowed_headers: "Content-Type,Authorization"
