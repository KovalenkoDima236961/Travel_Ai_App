services:
  external-integrations-service:
    build:
      context: .
    environment:
      APP_ENV: development
      HTTP_ADDR: ":8084"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CORS_ALLOWED_METHODS: GET,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization
      PLACE_PROVIDER: mock
      GOOGLE_PLACES_API_KEY: ""
      MAPBOX_API_KEY: ""
    ports:
      - "8084:8084"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8084/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
