env: development

http_server:
  address: ":8084"
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 15s

cors:
  allowed_origins: "http://localhost:3000"
  allowed_methods: "GET,POST,OPTIONS"
  allowed_headers: "Content-Type,Authorization"

place_provider:
  provider: mock
  google_places_api_key: ""
  mapbox_api_key: ""

route_provider:
  # v1 supports only the deterministic mock provider.
  provider: mock
  # Documented for future real providers; unused in v1.
  osrm_base_url: ""
  mapbox_access_token: ""
  google_maps_api_key: ""

weather_provider:
  # v1 supports only the deterministic mock provider.
  provider: mock
  # Documented for future real providers; unused in v1.
  open_meteo_base_url: ""
  weather_api_key: ""
