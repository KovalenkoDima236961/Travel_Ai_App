env: development

http_server:
  address: ":8084"
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 15s

postgres:
  database: external_integrations_service
  username: postgres
  password: postgres
  host: localhost
  port: 5432
  min-conns: 2
  max-conns: 10
  mig-path: ./migrations

auth:
  jwt_access_secret: change-me-in-development
  header_name: Authorization

internal:
  service_token: dev-internal-service-token

ops:
  dashboard_enabled: false
  admin_emails: ""
  internal_service_token: dev-internal-service-token

cors:
  allowed_origins: "http://localhost:3000"
  allowed_methods: "GET,POST,DELETE,OPTIONS"
  allowed_headers: "Content-Type,Authorization"

place_provider:
  provider: mock
  fallback_to_mock: true
  foursquare_api_key: ""
  foursquare_base_url: "https://api.foursquare.com/v3"
  foursquare_timeout_seconds: 8
  google_places_api_key: ""
  mapbox_api_key: ""

route_provider:
  # mock (default and fallback) | ors (OpenRouteService).
  provider: mock
  fallback_to_mock: true
  timeout_seconds: 8
  ors_api_key: ""
  ors_base_url: "https://api.openrouteservice.org"
  ors_profile_walking: "foot-walking"
  ors_profile_driving: "driving-car"
  ors_profile_cycling: "cycling-regular"
  cache_enabled: true
  cache_ttl_seconds: 21600
  # Documented for future real providers; unused in v1.
  osrm_base_url: ""
  mapbox_access_token: ""
  google_maps_api_key: ""

transport_provider:
  # mock (deterministic schedules) | route_estimate (car/walk/bike/public transport estimates) |
  # gtfs_static | amadeus | skyscanner | rome2rio | national_rail | ferry_provider | manual.
  provider: mock
  fallback_to_mock: true
  timeout_seconds: 8
  cache_enabled: true
  cache_ttl_seconds: 3600
  max_options_per_mode: 3
  default_currency: EUR
  amadeus_api_key: ""
  skyscanner_api_key: ""
  rome2rio_api_key: ""
  gtfs_static_feeds_dir: ""
  national_rail_api_key: ""
  ferry_provider_api_key: ""

weather_provider:
  # mock (default and fallback) | openweathermap (OpenWeatherMap).
  provider: mock
  fallback_to_mock: true
  timeout_seconds: 8
  openweather_api_key: ""
  openweather_base_url: "https://api.openweathermap.org"
  openweather_units: "metric"
  cache_enabled: true
  cache_ttl_seconds: 3600
  # Documented for future real providers; unused in v1.
  open_meteo_base_url: ""
  weather_api_key: ""

exchange_rate_provider:
  provider: mock
  fallback_to_mock: true
  timeout_seconds: 8
  base_url: ""
  api_key: ""
  cache_enabled: true
  cache_ttl_seconds: 21600

price_provider:
  provider: mock
  fallback_to_mock: true
  timeout_seconds: 8
  cache_enabled: true
  cache_ttl_seconds: 86400
  default_currency: EUR
  base_url: ""
  api_key: ""

availability:
  enabled: true
  provider: mock
  fallback_to_mock: true
  timeout_seconds: 8
  cache_enabled: true
  cache_ttl_seconds: 900
  default_currency: EUR
  getyourguide_api_key: ""
  getyourguide_base_url: ""
  viator_api_key: ""
  viator_base_url: ""
  tiqets_api_key: ""
  tiqets_base_url: ""

calendar:
  enabled: true
  provider: mock
  google_client_id: ""
  google_client_secret: ""
  google_redirect_url: "http://localhost:8084/calendar/google/callback"
  google_scopes: "https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.freebusy"
  encryption_key: "dev-calendar-token-key-32-bytes!"
  oauth_state_ttl_seconds: 600
  public_web_base_url: "http://localhost:3000"
  default_time_zone: "Europe/Bratislava"
  google_auth_url: "https://accounts.google.com/o/oauth2/v2/auth"
  google_token_url: "https://oauth2.googleapis.com/token"
  google_user_info_url: "https://www.googleapis.com/oauth2/v2/userinfo"
  google_calendar_api: "https://www.googleapis.com/calendar/v3"
  mock_account_email: "mock-calendar@example.local"
  mock_event_link_base: "http://localhost:3000/mock-calendar/events"
  free_busy_enabled: true
  free_busy_max_range_days: 180
  free_busy_timeout_seconds: 10
  free_busy_primary_only: true
  free_busy_cache_enabled: false
