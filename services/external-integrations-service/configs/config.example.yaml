env: development

http_server:
  address: ":8084"
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 15s

cors:
  allowed_origins: "http://localhost:3000"
  allowed_methods: "GET,OPTIONS"
  allowed_headers: "Content-Type,Authorization"

place_provider:
  provider: mock
  google_places_api_key: ""
  mapbox_api_key: ""
