services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    # The service applies migrations itself on startup (golang-migrate),
    # so no separate migrate step is needed.
    environment:
      APP_ENV: development
      HTTP_ADDRESS: ":8082"
      JWT_ACCESS_SECRET: change-me-in-development
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "30"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CORS_ALLOWED_METHODS: GET,POST,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_MIN_CONNS: "2"
      POSTGRES_MAX_CONNS: "10"
      POSTGRES_MIG_PATH: /app/migrations
    ports:
      - "8082:8082"

volumes:
  pgdata:
