services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    # The service applies migrations itself on startup (golang-migrate),
    # so no separate migrate step is needed.
    environment:
      APP_ENV: development
      HTTP_ADDRESS: ":8083"
      AUTH_REQUIRED: "true"
      JWT_ACCESS_SECRET: change-me-in-development
      AUTH_HEADER_NAME: Authorization
      DEV_USER_ID: 00000000-0000-0000-0000-000000000001
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CORS_ALLOWED_METHODS: GET,PUT,PATCH,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization
      POSTGRES_DB: user_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_MIN_CONNS: "2"
      POSTGRES_MAX_CONNS: "10"
      POSTGRES_MIG_PATH: /app/migrations
    ports:
      - "8083:8083"

volumes:
  pgdata:

