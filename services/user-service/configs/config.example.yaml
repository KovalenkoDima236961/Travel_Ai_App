# Example configuration for the User Service.
# Copy to configs/config.yaml and pass via: ./server -config ./configs/config.yaml
# Any value can also be overridden by the matching environment variable.

env: development # development | production

http_server:
  address: ":8083"
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 15s

auth:
  required: true
  jwt_access_secret: change-me-in-development
  header_name: Authorization
  dev_user_id: 00000000-0000-0000-0000-000000000001

internal:
  service_token: dev-internal-service-token

auth_users:
  auth_service_url: http://auth-service:8082
  timeout_seconds: 5

notifications:
  enabled: true
  fail_open: true
  notification_service_url: http://notification-service:8086
  notification_service_token: dev-internal-service-token
  public_web_base_url: http://localhost:3000
  timeout_seconds: 3

data_exports:
  enabled: true
  storage_dir: ./data/exports
  ttl_hours: 24
  max_account_export_mb: 250
  cleanup_enabled: true
  cleanup_interval_minutes: 60

trip_exports:
  enabled: true
  trip_service_url: http://trip-service:8080
  service_token: dev-internal-service-token
  timeout_seconds: 60

cors:
  allowed_origins: http://localhost:3000
  allowed_methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed_headers: Content-Type,Authorization

postgres:
  database: user_service
  username: postgres
  password: postgres
  host: localhost
  port: 5432
  min-conns: 2
  max-conns: 10
  mig-path: ./migrations
