# Example configuration for the Trip Service.
# Copy to configs/config.yaml and pass via:  ./server -config ./configs/config.yaml
# Any value can also be overridden by the matching environment variable.

env: development # development | production

http_server:
  address: ":8080"
  read_timeout: 15s
  write_timeout: 150s
  idle_timeout: 60s
  shutdown_timeout: 15s

auth:
  required: true
  jwt_access_secret: change-me-in-development
  header_name: Authorization
  dev_user_id: 00000000-0000-0000-0000-000000000001
  internal_service_token: dev-internal-service-token
  internal_service_tokens: ""

cors:
  allowed_origins: http://localhost:3000
  allowed_methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed_headers: Content-Type,Authorization

postgres:
  database: trip_service
  username: postgres
  password: postgres
  host: localhost
  port: 5432
  min-conns: 2
  max-conns: 10
  mig-path: ./migrations

itinerary_generator:
  mode: mock # mock | http
  ai_planning_service_url: http://localhost:8000
  ai_planning_timeout_seconds: 120

trip_discovery:
  enabled: true
  ai_timeout_seconds: 120
  max_previous_trips: 15
  default_suggestion_count: 5

trip_library:
  enabled: true
  ready_health_score_threshold: 80
  ready_verification_score_threshold: 75

data_exports:
  enabled: true
  storage_dir: ./data/exports
  ttl_hours: 24
  max_trip_export_mb: 100
  include_receipt_files_default: false
  cleanup_enabled: true
  cleanup_interval_minutes: 60

trip_health:
  enabled: true
  cache_ttl_seconds: 60
  include_debug: false
  large_expense_receipt_threshold: 100
  default_max_walking_km_per_day: 12
  default_max_transfer_minutes_per_day: 480

budget_confidence:
  enabled: true
  cache_ttl_seconds: 60
  fail_open: true
  large_expense_receipt_threshold: 100
  actual_spend_high_threshold_percent: 80
  planned_actual_gap_warning_percent: 20
  planned_actual_gap_high_percent: 40

copilot:
  enabled: true
  mode: mock # mock | ai (uses the local AI Planning Service)
  fail_open: false
  max_message_chars: 2000
  max_context_chars: 12000
  timeout_seconds: 20
  store_history: false
  history_retention_days: 7
  public_share_enabled: false
  rate_limit_per_minute: 20

ai_validation:
  enabled: true
  repair_enabled: true
  max_repair_attempts: 2
  block_on_schema_errors: true
  block_on_policy_blockers: true
  block_on_critical_route_errors: true
  block_on_budget_errors: true
  fail_open: false

ai_observability:
  enabled: true
  trace_events_enabled: true
  store_redacted_prompts: false
  store_redacted_responses: false
  max_prompt_snapshot_chars: 12000
  retention_days: 30
  fail_open: true
  debug_local_only: true
  prompt_logging_enabled: false
  prompt_logging_redacted_only: true
  redaction_enabled: true

user_context:
  enabled: true
  user_service_url: http://localhost:8083
  timeout_seconds: 5
  fail_open: true

weather_context:
  enabled: true
  external_integrations_service_url: http://localhost:8084
  timeout_seconds: 5
  fail_open: true

place_enrichment:
  enabled: true
  external_integrations_service_url: http://localhost:8084
  fail_open: true
  timeout_seconds: 5
  min_confidence: 0.75
  max_items: 20
  overwrite_existing: false

price_enrichment:
  enabled: true
  external_integrations_service_url: http://localhost:8084
  internal_service_token: dev-internal-service-token
  fail_open: true
  timeout_seconds: 8
  overwrite_ai_costs: false
  overwrite_manual_costs: false
  min_match_confidence: 0.55
  max_items: 30
  default_currency: EUR

user_lookup:
  auth_service_url: http://localhost:8081
  internal_service_token: dev-internal-service-token
  timeout_seconds: 5

workspaces:
  enabled: true
  user_service_url: http://localhost:8083
  service_token: dev-internal-service-token
  timeout_seconds: 5

public_sharing:
  enabled: true
  public_web_base_url: http://localhost:3000
  share_token_bytes: 32
  public_share_access_secret: dev-public-share-secret-change-me
  public_share_access_ttl_minutes: 60
  unlock_rate_limit_per_minute: 5
  access_rate_limit_per_minute: 120

presence:
  enabled: true
  heartbeat_seconds: 25
  stale_after_seconds: 60
  max_connections_per_user_per_trip: 5
  send_full_snapshot: true

activity_stream:
  enabled: true
  heartbeat_seconds: 25
  write_timeout_seconds: 10
  max_connections_per_user_per_trip: 5
  client_buffer_size: 20

edit_locks:
  enabled: true
  ttl_seconds: 180
  renew_seconds: 45
  stale_cleanup_seconds: 30

search:
  enabled: true
  default_limit: 20
  max_limit: 50
  per_category_limit: 5
  min_query_length: 2
  query_timeout_seconds: 3

summary_cache:
  enabled: true
  ttl_seconds: 30
  max_items: 1000
  endpoint_timeout_seconds: 8
  library_insights_ttl_seconds: 300
  command_center_section_timeout_ms: 300
  command_center_parallel_enabled: true

generation_jobs:
  enabled: true
  worker_enabled: true
  dispatch_mode: in_process # in_process | queue
  worker_poll_interval_seconds: 2
  worker_max_concurrent: 1
  max_running_seconds: 600
  publish_timeout_seconds: 5
  publish_fail_open: false
  rabbitmq_url: amqp://guest:guest@localhost:5672/
  rabbitmq_exchange: trip.jobs.exchange
  rabbitmq_dlx: trip.jobs.dlx
  queue_name: trip.generation.jobs
  routing_key: trip.generation
  dead_letter_queue_name: trip.generation.dead_letter
  dead_letter_routing_key: trip.generation.dead
  retry_queue_name: trip.generation.retry
  retry_routing_key: trip.generation.retry
  retry_delay_seconds: 10
  prefetch: 1
  max_attempts: 3
  fail_open_notifications: true

calendar_sync:
  enabled: true
  external_integrations_service_url: http://external-integrations-service:8084
  internal_service_token: dev-internal-service-token
  timeout_seconds: 30
  default_time_zone: Europe/Bratislava
  free_busy_import_enabled: true
  free_busy_import_fail_open: false
  free_busy_import_timeout_seconds: 12

budget_conversion:
  enabled: true
  fail_open: true
  external_integrations_service_url: http://external-integrations-service:8084
  internal_service_token: dev-internal-service-token
  timeout_seconds: 8

transport_search:
  enabled: true
  fail_open: true
  external_integrations_service_url: http://external-integrations-service:8084
  internal_service_token: dev-internal-service-token
  timeout_seconds: 10

receipts:
  storage_provider: local
  local_dir: ./data/receipts
  max_file_size_mb: 10
  allowed_mime_types: image/jpeg,image/png,image/webp,application/pdf
  upload_max_bytes: 10485760
  upload_allowed_mime: image/jpeg,image/png,image/webp,application/pdf
  upload_allowed_ext: .jpg,.jpeg,.png,.webp,.pdf
  file_scanning_enabled: false
  file_scanning_fail_open: false
  upload_rate_limit_per_minute: 20
  ocr_enabled: true
  ocr_provider: mock
  ocr_timeout_seconds: 30
  ocr_fail_open: true
  ocr_store_raw_text: true

ops:
  dashboard_enabled: false
  admin_emails: ""
  internal_service_token: dev-internal-service-token
  stale_running_job_seconds: 900
