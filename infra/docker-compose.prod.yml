name: travel-ai-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - internal

  migration-runner:
    build:
      context: ..
      dockerfile: infra/Dockerfile.migrations
    image: ${IMAGE_REGISTRY:-travel-ai}/migration-runner:${IMAGE_TAG:-local}
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  ai-planning-service:
    build:
      context: ../services/ai-planning-service
    image: ${IMAGE_REGISTRY:-travel-ai}/ai-planning-service:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8000
      ITINERARY_GENERATOR_MODE: ${AI_ITINERARY_GENERATOR_MODE:-mock}
    volumes:
      - chroma-data:/app/app/data/chroma
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - internal

  auth-service:
    build:
      context: ../services/auth-service
    image: ${IMAGE_REGISTRY:-travel-ai}/auth-service:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    environment:
      HTTP_ADDRESS: :8082
      POSTGRES_DB: auth_service
      POSTGRES_MIG_PATH: /app/migrations
    depends_on:
      migration-runner:
        condition: service_completed_successfully
    ports:
      - "${AUTH_SERVICE_BIND:-127.0.0.1}:${AUTH_SERVICE_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - public
      - internal

  user-service:
    build:
      context: ../services/user-service
    image: ${IMAGE_REGISTRY:-travel-ai}/user-service:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    environment:
      HTTP_ADDRESS: :8083
      POSTGRES_DB: user_service
      POSTGRES_MIG_PATH: /app/migrations
      DATA_EXPORT_STORAGE_DIR: ${USER_DATA_EXPORT_STORAGE_DIR:-/var/app/exports}
      ACCOUNT_EXPORT_TRIP_DATA_ENABLED: ${ACCOUNT_EXPORT_TRIP_DATA_ENABLED:-true}
      TRIP_SERVICE_URL: http://trip-service:8080
      TRIP_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      TRIP_EXPORT_TIMEOUT_SECONDS: ${TRIP_EXPORT_TIMEOUT_SECONDS:-60}
    depends_on:
      migration-runner:
        condition: service_completed_successfully
    ports:
      - "${USER_SERVICE_BIND:-127.0.0.1}:${USER_SERVICE_PORT:-8083}:8083"
    volumes:
      - user-export-data:/var/app/exports
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - public
      - internal

  notification-service:
    build:
      context: ../services/notification-service
    image: ${IMAGE_REGISTRY:-travel-ai}/notification-service:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    environment:
      HTTP_ADDRESS: :8086
      POSTGRES_DB: notification_service
      POSTGRES_MIG_PATH: /app/migrations
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_SERVICE_BIND:-127.0.0.1}:${NOTIFICATION_SERVICE_PORT:-8086}:8086"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - public
      - internal

  external-integrations-service:
    build:
      context: ../services/external-integrations-service
    image: ${IMAGE_REGISTRY:-travel-ai}/external-integrations-service:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    environment:
      HTTP_ADDR: :8084
      POSTGRES_DB: external_integrations_service
      POSTGRES_MIG_PATH: /app/migrations
    depends_on:
      migration-runner:
        condition: service_completed_successfully
    ports:
      - "${EXTERNAL_INTEGRATIONS_SERVICE_BIND:-127.0.0.1}:${EXTERNAL_INTEGRATIONS_SERVICE_PORT:-8084}:8084"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - public
      - internal

  trip-service:
    build:
      context: ../services/trip-service
    image: ${IMAGE_REGISTRY:-travel-ai}/trip-service:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    environment:
      HTTP_ADDRESS: :8080
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_MIG_PATH: /app/migrations
      AUTH_SERVICE_URL: http://auth-service:8082
      USER_SERVICE_URL: http://user-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      EXTERNAL_INTEGRATIONS_SERVICE_URL: http://external-integrations-service:8084
      AI_PLANNING_SERVICE_URL: http://ai-planning-service:8000
      DATA_EXPORT_STORAGE_DIR: ${TRIP_DATA_EXPORT_STORAGE_DIR:-/var/app/exports}
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      ai-planning-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      external-integrations-service:
        condition: service_healthy
    ports:
      - "${TRIP_SERVICE_BIND:-127.0.0.1}:${TRIP_SERVICE_PORT:-8080}:8080"
    volumes:
      - trip-export-data:/var/app/exports
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - public
      - internal

  worker-service:
    build:
      context: ..
      dockerfile: services/worker-service/Dockerfile
    image: ${IMAGE_REGISTRY:-travel-ai}/worker-service:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    environment:
      SERVICE_NAME: worker-service
      WORKER_HTTP_ADDR: :8090
      GENERATION_JOB_DISPATCH_MODE: queue
      GENERATION_JOB_WORKER_ENABLED: "true"
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_MIG_PATH: /app/migrations
      AUTH_SERVICE_URL: http://auth-service:8082
      USER_SERVICE_URL: http://user-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      EXTERNAL_INTEGRATIONS_SERVICE_URL: http://external-integrations-service:8084
      AI_PLANNING_SERVICE_URL: http://ai-planning-service:8000
    depends_on:
      trip-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ai-planning-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      external-integrations-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - internal

  web-app:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:?NEXT_PUBLIC_APP_ENV is required}
        NEXT_PUBLIC_AUTH_SERVICE_URL: ${NEXT_PUBLIC_AUTH_SERVICE_URL:?NEXT_PUBLIC_AUTH_SERVICE_URL is required}
        NEXT_PUBLIC_TRIP_SERVICE_URL: ${NEXT_PUBLIC_TRIP_SERVICE_URL:?NEXT_PUBLIC_TRIP_SERVICE_URL is required}
        NEXT_PUBLIC_USER_SERVICE_URL: ${NEXT_PUBLIC_USER_SERVICE_URL:?NEXT_PUBLIC_USER_SERVICE_URL is required}
        NEXT_PUBLIC_EXTERNAL_INTEGRATIONS_SERVICE_URL: ${NEXT_PUBLIC_EXTERNAL_INTEGRATIONS_SERVICE_URL:?NEXT_PUBLIC_EXTERNAL_INTEGRATIONS_SERVICE_URL is required}
        NEXT_PUBLIC_NOTIFICATION_SERVICE_URL: ${NEXT_PUBLIC_NOTIFICATION_SERVICE_URL:?NEXT_PUBLIC_NOTIFICATION_SERVICE_URL is required}
        NEXT_PUBLIC_WORKER_SERVICE_URL: ${NEXT_PUBLIC_WORKER_SERVICE_URL:?NEXT_PUBLIC_WORKER_SERVICE_URL is required}
    image: ${IMAGE_REGISTRY:-travel-ai}/web-app:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${TRAVEL_AI_ENV_FILE:-.env.production}
    environment:
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:?NEXT_PUBLIC_APP_ENV is required}
      TRIP_SERVICE_INTERNAL_URL: http://trip-service:8080
      USER_SERVICE_INTERNAL_URL: http://user-service:8083
      NOTIFICATION_SERVICE_INTERNAL_URL: http://notification-service:8086
      EXTERNAL_INTEGRATIONS_SERVICE_INTERNAL_URL: http://external-integrations-service:8084
      WORKER_SERVICE_INTERNAL_URL: http://worker-service:8090
    depends_on:
      trip-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      external-integrations-service:
        condition: service_healthy
    ports:
      - "${WEB_APP_BIND:-0.0.0.0}:${WEB_APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - public
      - internal

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      trip-service:
        condition: service_healthy
      worker-service:
        condition: service_healthy
      external-integrations-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      ai-planning-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal

networks:
  public:
  internal:

volumes:
  postgres-data:
  rabbitmq-data:
  chroma-data:
  trip-export-data:
  user-export-data:
  prometheus-data:
  grafana-data:
