services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trip_service
    ports:
      - "5432:5432"
    volumes:
      - trip_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trip_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  ai-planning-service:
    build:
      context: ../services/ai-planning-service
    depends_on:
      ollama:
        condition: service_started
    environment:
      APP_ENV: development
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8000"
      LOG_LEVEL: INFO
      ITINERARY_GENERATOR_MODE: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1:8b
      OLLAMA_TIMEOUT_SECONDS: "60"
      OLLAMA_TEMPERATURE: "0.2"
      OLLAMA_NUM_PREDICT: "2048"
      OLLAMA_FALLBACK_TO_MOCK: "true"
      RAG_ENABLED: "false"
      RAG_KNOWLEDGE_DIR: app/data/knowledge
      RAG_CHROMA_DIR: app/data/chroma
      RAG_COLLECTION_NAME: travel_knowledge
      RAG_TOP_K: "5"
      RAG_MIN_SCORE: "0.0"
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_EMBEDDING_TIMEOUT_SECONDS: "30"
    volumes:
      - ai-planning-chroma:/app/app/data/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  trip-service:
    build:
      context: ../services/trip-service
    depends_on:
      postgres:
        condition: service_healthy
      ai-planning-service:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDRESS: ":8080"
      ITINERARY_GENERATOR_MODE: http
      AI_PLANNING_SERVICE_URL: http://ai-planning-service:8000
      AI_PLANNING_TIMEOUT_SECONDS: "10"
      POSTGRES_DB: trip_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_MIN_CONNS: "2"
      POSTGRES_MAX_CONNS: "10"
      POSTGRES_MIG_PATH: /app/migrations
    ports:
      - "8080:8080"

volumes:
  trip_pgdata:
  ollama-data:
  ai-planning-chroma:
