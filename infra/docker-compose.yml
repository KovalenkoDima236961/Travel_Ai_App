services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trip_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend

  ai-planning-service:
    build:
      context: ../services/ai-planning-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_HOST: ${AI_HTTP_HOST:-0.0.0.0}
      HTTP_PORT: ${AI_HTTP_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ITINERARY_GENERATOR_MODE: ${AI_ITINERARY_GENERATOR_MODE:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-90}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.2}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-2048}
      OLLAMA_FALLBACK_TO_MOCK: ${OLLAMA_FALLBACK_TO_MOCK:-true}
      OLLAMA_REPAIR_ENABLED: ${OLLAMA_REPAIR_ENABLED:-true}
      OLLAMA_REPAIR_ATTEMPTS: ${OLLAMA_REPAIR_ATTEMPTS:-1}
      LOG_LLM_PAYLOADS: ${LOG_LLM_PAYLOADS:-false}
      DESTINATION_CONTEXT_ENABLED: ${DESTINATION_CONTEXT_ENABLED:-true}
      DESTINATION_CONTEXT_DIR: ${DESTINATION_CONTEXT_DIR:-app/data/destinations}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_KNOWLEDGE_DIR: ${RAG_KNOWLEDGE_DIR:-app/data/knowledge}
      RAG_CHROMA_DIR: ${RAG_CHROMA_DIR:-app/data/chroma}
      RAG_COLLECTION_NAME: ${RAG_COLLECTION_NAME:-travel_knowledge}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.0}
      ANONYMIZED_TELEMETRY: ${ANONYMIZED_TELEMETRY:-false}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_EMBEDDING_TIMEOUT_SECONDS: ${OLLAMA_EMBEDDING_TIMEOUT_SECONDS:-60}
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/app/app/data/chroma
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  trip-service:
    build:
      context: ../services/trip-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDRESS: ${TRIP_HTTP_ADDRESS:-:8080}
      HTTP_WRITE_TIMEOUT: ${TRIP_HTTP_WRITE_TIMEOUT:-150s}
      ITINERARY_GENERATOR_MODE: ${TRIP_ITINERARY_GENERATOR_MODE:-http}
      AI_PLANNING_SERVICE_URL: ${AI_PLANNING_SERVICE_URL:-http://ai-planning-service:8000}
      AI_PLANNING_TIMEOUT_SECONDS: ${AI_PLANNING_TIMEOUT_SECONDS:-120}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8083}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_INTERNAL_URL:-http://auth-service:8082}
      USER_CONTEXT_ENABLED: ${USER_CONTEXT_ENABLED:-true}
      USER_CONTEXT_TIMEOUT_SECONDS: ${USER_CONTEXT_TIMEOUT_SECONDS:-5}
      USER_CONTEXT_FAIL_OPEN: ${USER_CONTEXT_FAIL_OPEN:-true}
      EXTERNAL_INTEGRATIONS_SERVICE_URL: ${EXTERNAL_INTEGRATIONS_SERVICE_URL:-http://external-integrations-service:8084}
      WEATHER_CONTEXT_ENABLED: ${WEATHER_CONTEXT_ENABLED:-true}
      WEATHER_CONTEXT_TIMEOUT_SECONDS: ${WEATHER_CONTEXT_TIMEOUT_SECONDS:-5}
      WEATHER_CONTEXT_FAIL_OPEN: ${WEATHER_CONTEXT_FAIL_OPEN:-true}
      PLACE_ENRICHMENT_ENABLED: ${PLACE_ENRICHMENT_ENABLED:-true}
      PLACE_ENRICHMENT_FAIL_OPEN: ${PLACE_ENRICHMENT_FAIL_OPEN:-true}
      PLACE_ENRICHMENT_TIMEOUT_SECONDS: ${PLACE_ENRICHMENT_TIMEOUT_SECONDS:-5}
      PLACE_ENRICHMENT_MIN_CONFIDENCE: ${PLACE_ENRICHMENT_MIN_CONFIDENCE:-0.75}
      PLACE_ENRICHMENT_MAX_ITEMS: ${PLACE_ENRICHMENT_MAX_ITEMS:-20}
      PLACE_ENRICHMENT_OVERWRITE_EXISTING: ${PLACE_ENRICHMENT_OVERWRITE_EXISTING:-false}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-http://localhost:3000}
      PUBLIC_SHARING_ENABLED: ${PUBLIC_SHARING_ENABLED:-true}
      SHARE_TOKEN_BYTES: ${SHARE_TOKEN_BYTES:-32}
      PUBLIC_SHARE_ACCESS_SECRET: ${PUBLIC_SHARE_ACCESS_SECRET:-dev-public-share-secret-change-me}
      PUBLIC_SHARE_ACCESS_TTL_MINUTES: ${PUBLIC_SHARE_ACCESS_TTL_MINUTES:-60}
      TRIP_PRESENCE_ENABLED: ${TRIP_PRESENCE_ENABLED:-true}
      TRIP_PRESENCE_HEARTBEAT_SECONDS: ${TRIP_PRESENCE_HEARTBEAT_SECONDS:-25}
      TRIP_PRESENCE_STALE_AFTER_SECONDS: ${TRIP_PRESENCE_STALE_AFTER_SECONDS:-60}
      TRIP_PRESENCE_MAX_CONNECTIONS_PER_USER_PER_TRIP: ${TRIP_PRESENCE_MAX_CONNECTIONS_PER_USER_PER_TRIP:-5}
      TRIP_PRESENCE_SEND_FULL_SNAPSHOT: ${TRIP_PRESENCE_SEND_FULL_SNAPSHOT:-true}
      TRIP_ACTIVITY_STREAM_ENABLED: ${TRIP_ACTIVITY_STREAM_ENABLED:-true}
      TRIP_ACTIVITY_STREAM_HEARTBEAT_SECONDS: ${TRIP_ACTIVITY_STREAM_HEARTBEAT_SECONDS:-25}
      TRIP_ACTIVITY_STREAM_WRITE_TIMEOUT_SECONDS: ${TRIP_ACTIVITY_STREAM_WRITE_TIMEOUT_SECONDS:-10}
      TRIP_ACTIVITY_STREAM_MAX_CONNECTIONS_PER_USER_PER_TRIP: ${TRIP_ACTIVITY_STREAM_MAX_CONNECTIONS_PER_USER_PER_TRIP:-5}
      TRIP_ACTIVITY_STREAM_CLIENT_BUFFER_SIZE: ${TRIP_ACTIVITY_STREAM_CLIENT_BUFFER_SIZE:-20}
      TRIP_EDIT_LOCKS_ENABLED: ${TRIP_EDIT_LOCKS_ENABLED:-true}
      TRIP_EDIT_LOCK_TTL_SECONDS: ${TRIP_EDIT_LOCK_TTL_SECONDS:-180}
      TRIP_EDIT_LOCK_RENEW_SECONDS: ${TRIP_EDIT_LOCK_RENEW_SECONDS:-45}
      TRIP_EDIT_LOCK_STALE_CLEANUP_SECONDS: ${TRIP_EDIT_LOCK_STALE_CLEANUP_SECONDS:-30}
      GENERATION_JOBS_ENABLED: ${GENERATION_JOBS_ENABLED:-true}
      GENERATION_JOB_WORKER_ENABLED: ${GENERATION_JOB_WORKER_ENABLED:-true}
      GENERATION_JOB_WORKER_POLL_INTERVAL_SECONDS: ${GENERATION_JOB_WORKER_POLL_INTERVAL_SECONDS:-2}
      GENERATION_JOB_WORKER_MAX_CONCURRENT: ${GENERATION_JOB_WORKER_MAX_CONCURRENT:-1}
      GENERATION_JOB_MAX_RUNNING_SECONDS: ${GENERATION_JOB_MAX_RUNNING_SECONDS:-600}
      GENERATION_JOB_FAIL_OPEN_NOTIFICATIONS: ${GENERATION_JOB_FAIL_OPEN_NOTIFICATIONS:-true}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-development}
      AUTH_HEADER_NAME: ${AUTH_HEADER_NAME:-Authorization}
      DEV_USER_ID: ${DEV_USER_ID:-00000000-0000-0000-0000-000000000001}
      NOTIFICATIONS_ENABLED: ${NOTIFICATIONS_ENABLED:-true}
      NOTIFICATIONS_FAIL_OPEN: ${NOTIFICATIONS_FAIL_OPEN:-true}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8086}
      NOTIFICATION_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      NOTIFICATION_SERVICE_TIMEOUT_SECONDS: ${NOTIFICATION_SERVICE_TIMEOUT_SECONDS:-3}
      CALENDAR_SYNC_ENABLED: ${CALENDAR_SYNC_ENABLED:-true}
      CALENDAR_SYNC_TIMEOUT_SECONDS: ${CALENDAR_SYNC_TIMEOUT_SECONDS:-30}
      DEFAULT_CALENDAR_TIMEZONE: ${DEFAULT_CALENDAR_TIMEZONE:-Europe/Bratislava}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      POSTGRES_DB: ${POSTGRES_DB:-trip_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-2}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      POSTGRES_MIG_PATH: ${POSTGRES_MIG_PATH:-/app/migrations}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}
    depends_on:
      postgres:
        condition: service_healthy
      ai-planning-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8080/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  auth-service:
    build:
      context: ../services/auth-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ${AUTH_HTTP_ADDR:-:8082}
      HTTP_ADDRESS: ${AUTH_HTTP_ADDRESS:-:8082}
      DATABASE_URL: ${AUTH_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/auth_service?sslmode=disable}
      DATABASE_MIGRATIONS_PATH: ${AUTH_DATABASE_MIGRATIONS_PATH:-/app/migrations}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-development}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      # Shared service-to-service token. Notification Service presents it when
      # calling POST /internal/users/batch to resolve recipient emails.
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      POSTGRES_DB: ${AUTH_POSTGRES_DB:-auth_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-2}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      POSTGRES_MIG_PATH: ${AUTH_POSTGRES_MIG_PATH:-/app/migrations}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${AUTH_CORS_ALLOWED_METHODS:-GET,POST,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-8082}:8082"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8082/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  user-service:
    build:
      context: ../services/user-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDRESS: ${USER_HTTP_ADDRESS:-:8083}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-development}
      AUTH_HEADER_NAME: ${AUTH_HEADER_NAME:-Authorization}
      DEV_USER_ID: ${DEV_USER_ID:-00000000-0000-0000-0000-000000000001}
      POSTGRES_DB: ${USER_POSTGRES_DB:-user_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-2}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      POSTGRES_MIG_PATH: ${USER_POSTGRES_MIG_PATH:-/app/migrations}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${USER_CORS_ALLOWED_METHODS:-GET,PUT,PATCH,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${USER_SERVICE_PORT:-8083}:8083"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8083/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  notification-service:
    build:
      context: ../services/notification-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDRESS: ${NOTIFICATION_HTTP_ADDRESS:-:8086}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-development}
      AUTH_HEADER_NAME: ${AUTH_HEADER_NAME:-Authorization}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      # Email notifications (v1). Mock provider sends no external mail and is the
      # safe local-dev default. Never commit real SMTP credentials.
      EMAIL_NOTIFICATIONS_ENABLED: ${EMAIL_NOTIFICATIONS_ENABLED:-true}
      EMAIL_NOTIFICATIONS_FAIL_OPEN: ${EMAIL_NOTIFICATIONS_FAIL_OPEN:-true}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_NOTIFICATION_TYPES: ${EMAIL_NOTIFICATION_TYPES:-collaboration_invited,comment_created,collaborator_role_changed,collaborator_removed}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-http://localhost:3000}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_INTERNAL_URL:-http://auth-service:8082}
      USER_SERVICE_URL: ${USER_SERVICE_INTERNAL_URL:-http://user-service:8083}
      USER_LOOKUP_TIMEOUT_SECONDS: ${USER_LOOKUP_TIMEOUT_SECONDS:-5}
      NOTIFICATION_SSE_ENABLED: ${NOTIFICATION_SSE_ENABLED:-true}
      NOTIFICATION_SSE_HEARTBEAT_SECONDS: ${NOTIFICATION_SSE_HEARTBEAT_SECONDS:-25}
      NOTIFICATION_SSE_WRITE_TIMEOUT_SECONDS: ${NOTIFICATION_SSE_WRITE_TIMEOUT_SECONDS:-10}
      NOTIFICATION_SSE_MAX_CONNECTIONS_PER_USER: ${NOTIFICATION_SSE_MAX_CONNECTIONS_PER_USER:-5}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@localhost}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-AI Travel Planner}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      POSTGRES_DB: ${NOTIFICATION_POSTGRES_DB:-notification_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-2}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      POSTGRES_MIG_PATH: ${NOTIFICATION_POSTGRES_MIG_PATH:-/app/migrations}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${NOTIFICATION_CORS_ALLOWED_METHODS:-GET,PUT,PATCH,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8086}:8086"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8086/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  external-integrations-service:
    build:
      context: ../services/external-integrations-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ${EXTERNAL_INTEGRATIONS_HTTP_ADDR:-:8084}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-development}
      AUTH_HEADER_NAME: ${AUTH_HEADER_NAME:-Authorization}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      POSTGRES_DB: ${EXTERNAL_INTEGRATIONS_POSTGRES_DB:-external_integrations_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-2}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      POSTGRES_MIG_PATH: ${EXTERNAL_INTEGRATIONS_POSTGRES_MIG_PATH:-/app/migrations}
      PLACE_PROVIDER: ${PLACE_PROVIDER:-mock}
      PLACE_PROVIDER_FALLBACK_TO_MOCK: ${PLACE_PROVIDER_FALLBACK_TO_MOCK:-true}
      FOURSQUARE_API_KEY: ${FOURSQUARE_API_KEY:-}
      FOURSQUARE_BASE_URL: ${FOURSQUARE_BASE_URL:-https://api.foursquare.com/v3}
      FOURSQUARE_TIMEOUT_SECONDS: ${FOURSQUARE_TIMEOUT_SECONDS:-8}
      ROUTE_PROVIDER: ${ROUTE_PROVIDER:-mock}
      ROUTE_PROVIDER_FALLBACK_TO_MOCK: ${ROUTE_PROVIDER_FALLBACK_TO_MOCK:-true}
      ROUTE_PROVIDER_TIMEOUT_SECONDS: ${ROUTE_PROVIDER_TIMEOUT_SECONDS:-8}
      ORS_API_KEY: ${ORS_API_KEY:-}
      ORS_BASE_URL: ${ORS_BASE_URL:-https://api.openrouteservice.org}
      ORS_PROFILE_WALKING: ${ORS_PROFILE_WALKING:-foot-walking}
      ORS_PROFILE_DRIVING: ${ORS_PROFILE_DRIVING:-driving-car}
      ORS_PROFILE_CYCLING: ${ORS_PROFILE_CYCLING:-cycling-regular}
      ROUTE_CACHE_ENABLED: ${ROUTE_CACHE_ENABLED:-true}
      ROUTE_CACHE_TTL_SECONDS: ${ROUTE_CACHE_TTL_SECONDS:-21600}
      WEATHER_PROVIDER: ${WEATHER_PROVIDER:-mock}
      WEATHER_PROVIDER_FALLBACK_TO_MOCK: ${WEATHER_PROVIDER_FALLBACK_TO_MOCK:-true}
      WEATHER_PROVIDER_TIMEOUT_SECONDS: ${WEATHER_PROVIDER_TIMEOUT_SECONDS:-8}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENWEATHER_BASE_URL: ${OPENWEATHER_BASE_URL:-https://api.openweathermap.org}
      OPENWEATHER_UNITS: ${OPENWEATHER_UNITS:-metric}
      WEATHER_CACHE_ENABLED: ${WEATHER_CACHE_ENABLED:-true}
      WEATHER_CACHE_TTL_SECONDS: ${WEATHER_CACHE_TTL_SECONDS:-3600}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${EXTERNAL_INTEGRATIONS_CORS_ALLOWED_METHODS:-GET,POST,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      MAPBOX_API_KEY: ${MAPBOX_API_KEY:-}
      GOOGLE_CALENDAR_ENABLED: ${GOOGLE_CALENDAR_ENABLED:-true}
      CALENDAR_PROVIDER: ${CALENDAR_PROVIDER:-mock}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URL: ${GOOGLE_OAUTH_REDIRECT_URL:-http://localhost:8084/calendar/google/callback}
      GOOGLE_CALENDAR_SCOPES: ${GOOGLE_CALENDAR_SCOPES:-https://www.googleapis.com/auth/calendar.events}
      CALENDAR_TOKEN_ENCRYPTION_KEY: ${CALENDAR_TOKEN_ENCRYPTION_KEY:-dev-calendar-token-key-32-bytes!}
      CALENDAR_OAUTH_STATE_TTL_SECONDS: ${CALENDAR_OAUTH_STATE_TTL_SECONDS:-600}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-http://localhost:3000}
      DEFAULT_CALENDAR_TIMEZONE: ${DEFAULT_CALENDAR_TIMEZONE:-Europe/Bratislava}
      OSRM_BASE_URL: ${OSRM_BASE_URL:-}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      OPEN_METEO_BASE_URL: ${OPEN_METEO_BASE_URL:-}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${EXTERNAL_INTEGRATIONS_SERVICE_PORT:-8084}:8084"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8084/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  web-app:
    build:
      context: ../apps/web
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_AUTH_SERVICE_URL: ${NEXT_PUBLIC_AUTH_SERVICE_URL:-http://localhost:8082}
      NEXT_PUBLIC_TRIP_SERVICE_URL: ${NEXT_PUBLIC_TRIP_SERVICE_URL:-http://localhost:8080}
      NEXT_PUBLIC_USER_SERVICE_URL: ${NEXT_PUBLIC_USER_SERVICE_URL:-http://localhost:8083}
      NEXT_PUBLIC_EXTERNAL_INTEGRATIONS_SERVICE_URL: ${NEXT_PUBLIC_EXTERNAL_INTEGRATIONS_SERVICE_URL:-http://localhost:8084}
      NEXT_PUBLIC_NOTIFICATION_SERVICE_URL: ${NEXT_PUBLIC_NOTIFICATION_SERVICE_URL:-http://localhost:8086}
      TRIP_SERVICE_INTERNAL_URL: ${TRIP_SERVICE_INTERNAL_URL:-http://trip-service:8080}
      USER_SERVICE_INTERNAL_URL: ${USER_SERVICE_INTERNAL_URL:-http://user-service:8083}
      NOTIFICATION_SERVICE_INTERNAL_URL: ${NOTIFICATION_SERVICE_INTERNAL_URL:-http://notification-service:8086}
      EXTERNAL_INTEGRATIONS_SERVICE_INTERNAL_URL: ${EXTERNAL_INTEGRATIONS_SERVICE_INTERNAL_URL:-http://external-integrations-service:8084}
    depends_on:
      trip-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      external-integrations-service:
        condition: service_healthy
    ports:
      - "${WEB_APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:3000",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend

  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    networks:
      - backend

networks:
  backend:

volumes:
  postgres-data:
  ollama-data:
  chroma-data:
