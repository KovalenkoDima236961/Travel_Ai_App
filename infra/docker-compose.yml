services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trip_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend

  ai-planning-service:
    build:
      context: ../services/ai-planning-service
    environment:
      APP_ENV: ${APP_ENV:-local}
      HTTP_HOST: ${AI_HTTP_HOST:-0.0.0.0}
      HTTP_PORT: ${AI_HTTP_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ITINERARY_GENERATOR_MODE: ${AI_ITINERARY_GENERATOR_MODE:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-90}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.2}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-2048}
      OLLAMA_FALLBACK_TO_MOCK: ${OLLAMA_FALLBACK_TO_MOCK:-true}
      OLLAMA_REPAIR_ENABLED: ${OLLAMA_REPAIR_ENABLED:-true}
      OLLAMA_REPAIR_ATTEMPTS: ${OLLAMA_REPAIR_ATTEMPTS:-1}
      LOG_LLM_PAYLOADS: ${LOG_LLM_PAYLOADS:-false}
      AI_PROMPT_LOGGING_ENABLED: ${AI_PROMPT_LOGGING_ENABLED:-false}
      AI_PROMPT_LOGGING_REDACTED_ONLY: ${AI_PROMPT_LOGGING_REDACTED_ONLY:-true}
      DESTINATION_CONTEXT_ENABLED: ${DESTINATION_CONTEXT_ENABLED:-true}
      DESTINATION_CONTEXT_DIR: ${DESTINATION_CONTEXT_DIR:-app/data/destinations}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_KNOWLEDGE_DIR: ${RAG_KNOWLEDGE_DIR:-app/data/knowledge}
      RAG_CHROMA_DIR: ${RAG_CHROMA_DIR:-app/data/chroma}
      RAG_COLLECTION_NAME: ${RAG_COLLECTION_NAME:-travel_knowledge}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.0}
      ANONYMIZED_TELEMETRY: ${ANONYMIZED_TELEMETRY:-false}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_EMBEDDING_TIMEOUT_SECONDS: ${OLLAMA_EMBEDDING_TIMEOUT_SECONDS:-60}
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/app/app/data/chroma
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  trip-service:
    build:
      context: ../services/trip-service
    environment:
      APP_ENV: ${APP_ENV:-local}
      HTTP_ADDRESS: ${TRIP_HTTP_ADDRESS:-:8080}
      HTTP_WRITE_TIMEOUT: ${TRIP_HTTP_WRITE_TIMEOUT:-150s}
      ITINERARY_GENERATOR_MODE: ${TRIP_ITINERARY_GENERATOR_MODE:-http}
      AI_PLANNING_SERVICE_URL: ${AI_PLANNING_SERVICE_URL:-http://ai-planning-service:8000}
      AI_PLANNING_TIMEOUT_SECONDS: ${AI_PLANNING_TIMEOUT_SECONDS:-120}
      AI_OBSERVABILITY_ENABLED: ${AI_OBSERVABILITY_ENABLED:-true}
      AI_OBSERVABILITY_TRACE_EVENTS_ENABLED: ${AI_OBSERVABILITY_TRACE_EVENTS_ENABLED:-true}
      AI_OBSERVABILITY_STORE_REDACTED_PROMPTS: ${AI_OBSERVABILITY_STORE_REDACTED_PROMPTS:-false}
      AI_OBSERVABILITY_STORE_REDACTED_RESPONSES: ${AI_OBSERVABILITY_STORE_REDACTED_RESPONSES:-false}
      AI_OBSERVABILITY_MAX_PROMPT_SNAPSHOT_CHARS: ${AI_OBSERVABILITY_MAX_PROMPT_SNAPSHOT_CHARS:-12000}
      AI_OBSERVABILITY_RETENTION_DAYS: ${AI_OBSERVABILITY_RETENTION_DAYS:-30}
      AI_OBSERVABILITY_FAIL_OPEN: ${AI_OBSERVABILITY_FAIL_OPEN:-true}
      AI_OBSERVABILITY_DEBUG_LOCAL_ONLY: ${AI_OBSERVABILITY_DEBUG_LOCAL_ONLY:-true}
      AI_OBSERVABILITY_REDACTION_ENABLED: ${AI_OBSERVABILITY_REDACTION_ENABLED:-true}
      AI_PROMPT_LOGGING_ENABLED: ${AI_PROMPT_LOGGING_ENABLED:-false}
      AI_PROMPT_LOGGING_REDACTED_ONLY: ${AI_PROMPT_LOGGING_REDACTED_ONLY:-true}
      TRIP_DISCOVERY_ENABLED: ${TRIP_DISCOVERY_ENABLED:-true}
      TRIP_DISCOVERY_AI_TIMEOUT_SECONDS: ${TRIP_DISCOVERY_AI_TIMEOUT_SECONDS:-120}
      TRIP_DISCOVERY_MAX_PREVIOUS_TRIPS: ${TRIP_DISCOVERY_MAX_PREVIOUS_TRIPS:-15}
      TRIP_DISCOVERY_DEFAULT_SUGGESTION_COUNT: ${TRIP_DISCOVERY_DEFAULT_SUGGESTION_COUNT:-5}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8083}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_INTERNAL_URL:-http://auth-service:8082}
      USER_CONTEXT_ENABLED: ${USER_CONTEXT_ENABLED:-true}
      USER_CONTEXT_TIMEOUT_SECONDS: ${USER_CONTEXT_TIMEOUT_SECONDS:-5}
      USER_CONTEXT_FAIL_OPEN: ${USER_CONTEXT_FAIL_OPEN:-true}
      EXTERNAL_INTEGRATIONS_SERVICE_URL: ${EXTERNAL_INTEGRATIONS_SERVICE_URL:-http://external-integrations-service:8084}
      WEATHER_CONTEXT_ENABLED: ${WEATHER_CONTEXT_ENABLED:-true}
      WEATHER_CONTEXT_TIMEOUT_SECONDS: ${WEATHER_CONTEXT_TIMEOUT_SECONDS:-5}
      WEATHER_CONTEXT_FAIL_OPEN: ${WEATHER_CONTEXT_FAIL_OPEN:-true}
      PLACE_ENRICHMENT_ENABLED: ${PLACE_ENRICHMENT_ENABLED:-true}
      PLACE_ENRICHMENT_FAIL_OPEN: ${PLACE_ENRICHMENT_FAIL_OPEN:-true}
      PLACE_ENRICHMENT_TIMEOUT_SECONDS: ${PLACE_ENRICHMENT_TIMEOUT_SECONDS:-5}
      PLACE_ENRICHMENT_MIN_CONFIDENCE: ${PLACE_ENRICHMENT_MIN_CONFIDENCE:-0.75}
      PLACE_ENRICHMENT_MAX_ITEMS: ${PLACE_ENRICHMENT_MAX_ITEMS:-20}
      PLACE_ENRICHMENT_OVERWRITE_EXISTING: ${PLACE_ENRICHMENT_OVERWRITE_EXISTING:-false}
      PRICE_ENRICHMENT_ENABLED: ${PRICE_ENRICHMENT_ENABLED:-true}
      PRICE_ENRICHMENT_FAIL_OPEN: ${PRICE_ENRICHMENT_FAIL_OPEN:-true}
      PRICE_ENRICHMENT_TIMEOUT_SECONDS: ${PRICE_ENRICHMENT_TIMEOUT_SECONDS:-8}
      PRICE_ENRICHMENT_OVERWRITE_AI_COSTS: ${PRICE_ENRICHMENT_OVERWRITE_AI_COSTS:-false}
      PRICE_ENRICHMENT_OVERWRITE_MANUAL_COSTS: ${PRICE_ENRICHMENT_OVERWRITE_MANUAL_COSTS:-false}
      PRICE_ENRICHMENT_MIN_MATCH_CONFIDENCE: ${PRICE_ENRICHMENT_MIN_MATCH_CONFIDENCE:-0.55}
      PRICE_ENRICHMENT_MAX_ITEMS: ${PRICE_ENRICHMENT_MAX_ITEMS:-30}
      PRICE_ENRICHMENT_DEFAULT_CURRENCY: ${PRICE_ENRICHMENT_DEFAULT_CURRENCY:-EUR}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-http://localhost:3000}
      PUBLIC_SHARING_ENABLED: ${PUBLIC_SHARING_ENABLED:-true}
      SHARE_TOKEN_BYTES: ${SHARE_TOKEN_BYTES:-32}
      PUBLIC_SHARE_ACCESS_SECRET: ${PUBLIC_SHARE_ACCESS_SECRET:-dev-public-share-secret-change-me}
      PUBLIC_SHARE_ACCESS_TTL_MINUTES: ${PUBLIC_SHARE_ACCESS_TTL_MINUTES:-60}
      SHARE_UNLOCK_RATE_LIMIT_PER_MINUTE: ${SHARE_UNLOCK_RATE_LIMIT_PER_MINUTE:-5}
      PUBLIC_SHARE_ACCESS_RATE_LIMIT_PER_MINUTE: ${PUBLIC_SHARE_ACCESS_RATE_LIMIT_PER_MINUTE:-120}
      RECEIPT_UPLOAD_MAX_BYTES: ${RECEIPT_UPLOAD_MAX_BYTES:-10485760}
      RECEIPT_UPLOAD_ALLOWED_MIME: ${RECEIPT_UPLOAD_ALLOWED_MIME:-image/jpeg,image/png,image/webp,application/pdf}
      RECEIPT_UPLOAD_ALLOWED_EXT: ${RECEIPT_UPLOAD_ALLOWED_EXT:-.jpg,.jpeg,.png,.webp,.pdf}
      RECEIPT_UPLOAD_RATE_LIMIT_PER_MINUTE: ${RECEIPT_UPLOAD_RATE_LIMIT_PER_MINUTE:-20}
      FILE_SCANNING_ENABLED: ${FILE_SCANNING_ENABLED:-false}
      FILE_SCANNING_FAIL_OPEN: ${FILE_SCANNING_FAIL_OPEN:-false}
      TRIP_PRESENCE_ENABLED: ${TRIP_PRESENCE_ENABLED:-true}
      TRIP_PRESENCE_HEARTBEAT_SECONDS: ${TRIP_PRESENCE_HEARTBEAT_SECONDS:-25}
      TRIP_PRESENCE_STALE_AFTER_SECONDS: ${TRIP_PRESENCE_STALE_AFTER_SECONDS:-60}
      TRIP_PRESENCE_MAX_CONNECTIONS_PER_USER_PER_TRIP: ${TRIP_PRESENCE_MAX_CONNECTIONS_PER_USER_PER_TRIP:-5}
      TRIP_PRESENCE_SEND_FULL_SNAPSHOT: ${TRIP_PRESENCE_SEND_FULL_SNAPSHOT:-true}
      TRIP_ACTIVITY_STREAM_ENABLED: ${TRIP_ACTIVITY_STREAM_ENABLED:-true}
      TRIP_ACTIVITY_STREAM_HEARTBEAT_SECONDS: ${TRIP_ACTIVITY_STREAM_HEARTBEAT_SECONDS:-25}
      TRIP_ACTIVITY_STREAM_WRITE_TIMEOUT_SECONDS: ${TRIP_ACTIVITY_STREAM_WRITE_TIMEOUT_SECONDS:-10}
      TRIP_ACTIVITY_STREAM_MAX_CONNECTIONS_PER_USER_PER_TRIP: ${TRIP_ACTIVITY_STREAM_MAX_CONNECTIONS_PER_USER_PER_TRIP:-5}
      TRIP_ACTIVITY_STREAM_CLIENT_BUFFER_SIZE: ${TRIP_ACTIVITY_STREAM_CLIENT_BUFFER_SIZE:-20}
      TRIP_EDIT_LOCKS_ENABLED: ${TRIP_EDIT_LOCKS_ENABLED:-true}
      TRIP_EDIT_LOCK_TTL_SECONDS: ${TRIP_EDIT_LOCK_TTL_SECONDS:-180}
      TRIP_EDIT_LOCK_RENEW_SECONDS: ${TRIP_EDIT_LOCK_RENEW_SECONDS:-45}
      TRIP_EDIT_LOCK_STALE_CLEANUP_SECONDS: ${TRIP_EDIT_LOCK_STALE_CLEANUP_SECONDS:-30}
      GENERATION_JOBS_ENABLED: ${GENERATION_JOBS_ENABLED:-true}
      GENERATION_JOB_DISPATCH_MODE: ${GENERATION_JOB_DISPATCH_MODE:-queue}
      GENERATION_JOB_WORKER_ENABLED: ${GENERATION_JOB_WORKER_ENABLED:-true}
      GENERATION_JOB_WORKER_POLL_INTERVAL_SECONDS: ${GENERATION_JOB_WORKER_POLL_INTERVAL_SECONDS:-2}
      GENERATION_JOB_WORKER_MAX_CONCURRENT: ${GENERATION_JOB_WORKER_MAX_CONCURRENT:-1}
      GENERATION_JOB_MAX_RUNNING_SECONDS: ${GENERATION_JOB_MAX_RUNNING_SECONDS:-600}
      GENERATION_JOB_PUBLISH_TIMEOUT_SECONDS: ${GENERATION_JOB_PUBLISH_TIMEOUT_SECONDS:-5}
      GENERATION_JOB_PUBLISH_FAIL_OPEN: ${GENERATION_JOB_PUBLISH_FAIL_OPEN:-false}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-trip.jobs.exchange}
      RABBITMQ_DLX: ${RABBITMQ_DLX:-trip.jobs.dlx}
      GENERATION_JOBS_QUEUE: ${GENERATION_JOBS_QUEUE:-trip.generation.jobs}
      GENERATION_JOBS_ROUTING_KEY: ${GENERATION_JOBS_ROUTING_KEY:-trip.generation}
      GENERATION_JOBS_DEAD_LETTER_QUEUE: ${GENERATION_JOBS_DEAD_LETTER_QUEUE:-trip.generation.dead_letter}
      GENERATION_JOBS_DEAD_LETTER_ROUTING_KEY: ${GENERATION_JOBS_DEAD_LETTER_ROUTING_KEY:-trip.generation.dead}
      GENERATION_JOBS_RETRY_QUEUE: ${GENERATION_JOBS_RETRY_QUEUE:-trip.generation.retry}
      GENERATION_JOBS_RETRY_ROUTING_KEY: ${GENERATION_JOBS_RETRY_ROUTING_KEY:-trip.generation.retry}
      GENERATION_JOBS_PREFETCH: ${GENERATION_JOBS_PREFETCH:-1}
      GENERATION_JOBS_MAX_ATTEMPTS: ${GENERATION_JOBS_MAX_ATTEMPTS:-3}
      GENERATION_JOBS_RETRY_DELAY_SECONDS: ${GENERATION_JOBS_RETRY_DELAY_SECONDS:-10}
      OPS_DASHBOARD_ENABLED: ${OPS_DASHBOARD_ENABLED:-false}
      OPS_ADMIN_EMAILS: ${OPS_ADMIN_EMAILS:-}
      OPS_INTERNAL_SERVICE_TOKEN: ${OPS_INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      OPS_STALE_RUNNING_JOB_SECONDS: ${OPS_STALE_RUNNING_JOB_SECONDS:-900}
      GENERATION_JOB_FAIL_OPEN_NOTIFICATIONS: ${GENERATION_JOB_FAIL_OPEN_NOTIFICATIONS:-true}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-development}
      AUTH_HEADER_NAME: ${AUTH_HEADER_NAME:-Authorization}
      DEV_USER_ID: ${DEV_USER_ID:-00000000-0000-0000-0000-000000000001}
      NOTIFICATIONS_ENABLED: ${NOTIFICATIONS_ENABLED:-true}
      NOTIFICATIONS_FAIL_OPEN: ${NOTIFICATIONS_FAIL_OPEN:-true}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8086}
      NOTIFICATION_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      NOTIFICATION_SERVICE_TIMEOUT_SECONDS: ${NOTIFICATION_SERVICE_TIMEOUT_SECONDS:-3}
      CALENDAR_SYNC_ENABLED: ${CALENDAR_SYNC_ENABLED:-true}
      CALENDAR_SYNC_TIMEOUT_SECONDS: ${CALENDAR_SYNC_TIMEOUT_SECONDS:-30}
      DEFAULT_CALENDAR_TIMEZONE: ${DEFAULT_CALENDAR_TIMEZONE:-Europe/Bratislava}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      INTERNAL_SERVICE_TOKENS: ${INTERNAL_SERVICE_TOKENS:-}
      BUDGET_CONVERSION_ENABLED: ${BUDGET_CONVERSION_ENABLED:-true}
      BUDGET_CONVERSION_FAIL_OPEN: ${BUDGET_CONVERSION_FAIL_OPEN:-true}
      EXCHANGE_RATE_CLIENT_TIMEOUT_SECONDS: ${EXCHANGE_RATE_CLIENT_TIMEOUT_SECONDS:-8}
      POSTGRES_DB: ${POSTGRES_DB:-trip_service}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-2}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      POSTGRES_MIG_PATH: ${POSTGRES_MIG_PATH:-/app/migrations}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ai-planning-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8080/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  worker-service:
    build:
      context: ..
      dockerfile: services/worker-service/Dockerfile
    environment:
      SERVICE_NAME: worker-service
      WORKER_ENABLED: ${WORKER_ENABLED:-true}
      WORKER_HTTP_ADDR: ${WORKER_HTTP_ADDR:-:8090}
      WORKER_SHUTDOWN_TIMEOUT_SECONDS: ${WORKER_SHUTDOWN_TIMEOUT_SECONDS:-30}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      OPS_DASHBOARD_ENABLED: ${OPS_DASHBOARD_ENABLED:-false}
      OPS_ADMIN_EMAILS: ${OPS_ADMIN_EMAILS:-}
      OPS_INTERNAL_SERVICE_TOKEN: ${OPS_INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      OPS_STALE_RUNNING_JOB_SECONDS: ${OPS_STALE_RUNNING_JOB_SECONDS:-900}
      APP_ENV: ${APP_ENV:-local}
      ITINERARY_GENERATOR_MODE: ${TRIP_ITINERARY_GENERATOR_MODE:-http}
      AI_PLANNING_SERVICE_URL: ${AI_PLANNING_SERVICE_URL:-http://ai-planning-service:8000}
      AI_PLANNING_TIMEOUT_SECONDS: ${AI_PLANNING_TIMEOUT_SECONDS:-120}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8083}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_INTERNAL_URL:-http://auth-service:8082}
      USER_CONTEXT_ENABLED: ${USER_CONTEXT_ENABLED:-true}
      USER_CONTEXT_TIMEOUT_SECONDS: ${USER_CONTEXT_TIMEOUT_SECONDS:-5}
      USER_CONTEXT_FAIL_OPEN: ${USER_CONTEXT_FAIL_OPEN:-true}
      EXTERNAL_INTEGRATIONS_SERVICE_URL: ${EXTERNAL_INTEGRATIONS_SERVICE_URL:-http://external-integrations-service:8084}
      WEATHER_CONTEXT_ENABLED: ${WEATHER_CONTEXT_ENABLED:-true}
      WEATHER_CONTEXT_TIMEOUT_SECONDS: ${WEATHER_CONTEXT_TIMEOUT_SECONDS:-5}
      WEATHER_CONTEXT_FAIL_OPEN: ${WEATHER_CONTEXT_FAIL_OPEN:-true}
      PLACE_ENRICHMENT_ENABLED: ${PLACE_ENRICHMENT_ENABLED:-true}
      PLACE_ENRICHMENT_FAIL_OPEN: ${PLACE_ENRICHMENT_FAIL_OPEN:-true}
      PLACE_ENRICHMENT_TIMEOUT_SECONDS: ${PLACE_ENRICHMENT_TIMEOUT_SECONDS:-5}
      PLACE_ENRICHMENT_MIN_CONFIDENCE: ${PLACE_ENRICHMENT_MIN_CONFIDENCE:-0.75}
      PLACE_ENRICHMENT_MAX_ITEMS: ${PLACE_ENRICHMENT_MAX_ITEMS:-20}
      PLACE_ENRICHMENT_OVERWRITE_EXISTING: ${PLACE_ENRICHMENT_OVERWRITE_EXISTING:-false}
      PRICE_ENRICHMENT_ENABLED: ${PRICE_ENRICHMENT_ENABLED:-true}
      PRICE_ENRICHMENT_FAIL_OPEN: ${PRICE_ENRICHMENT_FAIL_OPEN:-true}
      PRICE_ENRICHMENT_TIMEOUT_SECONDS: ${PRICE_ENRICHMENT_TIMEOUT_SECONDS:-8}
      PRICE_ENRICHMENT_OVERWRITE_AI_COSTS: ${PRICE_ENRICHMENT_OVERWRITE_AI_COSTS:-false}
      PRICE_ENRICHMENT_OVERWRITE_MANUAL_COSTS: ${PRICE_ENRICHMENT_OVERWRITE_MANUAL_COSTS:-false}
      PRICE_ENRICHMENT_MIN_MATCH_CONFIDENCE: ${PRICE_ENRICHMENT_MIN_MATCH_CONFIDENCE:-0.55}
      PRICE_ENRICHMENT_MAX_ITEMS: ${PRICE_ENRICHMENT_MAX_ITEMS:-30}
      PRICE_ENRICHMENT_DEFAULT_CURRENCY: ${PRICE_ENRICHMENT_DEFAULT_CURRENCY:-EUR}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-http://localhost:3000}
      PUBLIC_SHARING_ENABLED: ${PUBLIC_SHARING_ENABLED:-true}
      SHARE_TOKEN_BYTES: ${SHARE_TOKEN_BYTES:-32}
      PUBLIC_SHARE_ACCESS_SECRET: ${PUBLIC_SHARE_ACCESS_SECRET:-dev-public-share-secret-change-me}
      PUBLIC_SHARE_ACCESS_TTL_MINUTES: ${PUBLIC_SHARE_ACCESS_TTL_MINUTES:-60}
      GENERATION_JOBS_ENABLED: ${GENERATION_JOBS_ENABLED:-true}
      GENERATION_JOB_DISPATCH_MODE: queue
      GENERATION_JOB_WORKER_ENABLED: "true"
      GENERATION_JOB_WORKER_POLL_INTERVAL_SECONDS: ${GENERATION_JOB_WORKER_POLL_INTERVAL_SECONDS:-2}
      GENERATION_JOB_WORKER_MAX_CONCURRENT: ${GENERATION_JOB_WORKER_MAX_CONCURRENT:-1}
      GENERATION_JOB_MAX_RUNNING_SECONDS: ${GENERATION_JOB_MAX_RUNNING_SECONDS:-600}
      GENERATION_JOB_PUBLISH_TIMEOUT_SECONDS: ${GENERATION_JOB_PUBLISH_TIMEOUT_SECONDS:-5}
      GENERATION_JOB_PUBLISH_FAIL_OPEN: ${GENERATION_JOB_PUBLISH_FAIL_OPEN:-false}
      GENERATION_JOB_FAIL_OPEN_NOTIFICATIONS: ${GENERATION_JOB_FAIL_OPEN_NOTIFICATIONS:-true}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-trip.jobs.exchange}
      RABBITMQ_DLX: ${RABBITMQ_DLX:-trip.jobs.dlx}
      RABBITMQ_MANAGEMENT_URL: ${RABBITMQ_MANAGEMENT_URL:-http://rabbitmq:15672}
      RABBITMQ_MANAGEMENT_USER: ${RABBITMQ_MANAGEMENT_USER:-guest}
      RABBITMQ_MANAGEMENT_PASSWORD: ${RABBITMQ_MANAGEMENT_PASSWORD:-guest}
      GENERATION_JOBS_QUEUE: ${GENERATION_JOBS_QUEUE:-trip.generation.jobs}
      GENERATION_JOBS_ROUTING_KEY: ${GENERATION_JOBS_ROUTING_KEY:-trip.generation}
      GENERATION_JOBS_DEAD_LETTER_QUEUE: ${GENERATION_JOBS_DEAD_LETTER_QUEUE:-trip.generation.dead_letter}
      GENERATION_JOBS_DEAD_LETTER_ROUTING_KEY: ${GENERATION_JOBS_DEAD_LETTER_ROUTING_KEY:-trip.generation.dead}
      GENERATION_JOBS_RETRY_QUEUE: ${GENERATION_JOBS_RETRY_QUEUE:-trip.generation.retry}
      GENERATION_JOBS_RETRY_ROUTING_KEY: ${GENERATION_JOBS_RETRY_ROUTING_KEY:-trip.generation.retry}
      GENERATION_JOBS_PREFETCH: ${GENERATION_JOBS_PREFETCH:-1}
      GENERATION_JOBS_MAX_ATTEMPTS: ${GENERATION_JOBS_MAX_ATTEMPTS:-3}
      GENERATION_JOBS_RETRY_DELAY_SECONDS: ${GENERATION_JOBS_RETRY_DELAY_SECONDS:-10}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-development}
      AUTH_HEADER_NAME: ${AUTH_HEADER_NAME:-Authorization}
      DEV_USER_ID: ${DEV_USER_ID:-00000000-0000-0000-0000-000000000001}
      NOTIFICATIONS_ENABLED: ${NOTIFICATIONS_ENABLED:-true}
      NOTIFICATIONS_FAIL_OPEN: ${NOTIFICATIONS_FAIL_OPEN:-true}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8086}
      NOTIFICATION_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      NOTIFICATION_SERVICE_TIMEOUT_SECONDS: ${NOTIFICATION_SERVICE_TIMEOUT_SECONDS:-3}
